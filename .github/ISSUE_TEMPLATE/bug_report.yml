name: Bug Report
description: Report a bug in HMS
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!
        Do not include API keys or secrets in this report.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is
      placeholder: When I call the HMS store/search API, it ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: crate/package version or the commit hash
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, language runtime, and relevant configuration
      placeholder: macOS 15, Node 20, rustc 1.91
    validations:
      required: false
